<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VentureVibe</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: #0f1419;
        color: #e7e9ea;
      }
      main {
        max-width: 36rem;
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1rem;
        color: #8b98a5;
      }
      a {
        color: #1d9bf0;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      code {
        font-size: 0.9em;
        background: #1e2732;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>VentureVibe</h1>
      <p>
        This site is hosted with <strong>GitHub Pages</strong>. The main application is a
        <strong>Next.js</strong> project under <code>idea_validator/nextjs_space</code> — deploy it to
        Vercel, Netlify, or another Node host for the full app (API routes, auth, database).
      </p>
      <p>
        <a href="https://github.com/revmancil/venturevibe">View repository on GitHub</a>
      </p>
    </main>
  </body>
</html>
